<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#eaf6ff"/>
      <stop offset="1" stop-color="#fffdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="32%" r="55%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="0.55" stop-color="#f59e0b" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mist" cx="40%" cy="40%" r="70%">
      <stop offset="0" stop-color="#7bd3ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7bd3ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- soft background -->
  <rect width="1200" height="800" fill="url(#sky)"/>
  <circle cx="360" cy="280" r="330" fill="url(#mist)" filter="url(#soft)"/>
  <circle cx="740" cy="260" r="360" fill="url(#glow)" filter="url(#soft)"/>

  <!-- horizon -->
  <path d="M0 560 C240 520 420 620 600 580 C780 540 960 590 1200 560 L1200 800 L0 800 Z"
        fill="#f7f2e8"/>

  <!-- anemone-like dots (Darom Adom hint) -->
  <g opacity="0.22">
    <circle cx="250" cy="585" r="10" fill="#c0392b"/>
    <circle cx="290" cy="610" r="8" fill="#c0392b"/>
    <circle cx="330" cy="590" r="7" fill="#c0392b"/>
    <circle cx="870" cy="590" r="9" fill="#c0392b"/>
    <circle cx="910" cy="615" r="7" fill="#c0392b"/>
    <circle cx="950" cy="585" r="8" fill="#c0392b"/>
  </g>

  <!-- candle -->
  <g transform="translate(720 180)">
    <rect x="-80" y="200" width="160" height="310" rx="38" fill="#ffffff" stroke="#e6e1d8" stroke-width="6"/>
    <rect x="-70" y="222" width="140" height="14" rx="7" fill="#f3efe6"/>
    <!-- flame -->
    <path d="M0 96
             C-26 128 -18 168 0 188
             C18 168 26 128 0 96 Z"
          fill="#f59e0b" opacity="0.95"/>
    <path d="M0 118
             C-14 136 -10 160 0 172
             C10 160 14 136 0 118 Z"
          fill="#ffd08a" opacity="0.9"/>
    <circle cx="0" cy="140" r="120" fill="url(#glow)" opacity="0.9" filter="url(#soft)"/>
  </g>

  <!-- subtle vignette -->
  <rect width="1200" height="800" fill="#0f172a" opacity="0.03"/>
</svg>
