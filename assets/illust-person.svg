<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="איור נר זיכרון">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="65%">
      <stop offset="0" stop-color="#93c5fd" stop-opacity=".55"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="520" rx="28" fill="url(#g)"/>
  <circle cx="400" cy="170" r="190" fill="url(#glow)"/>

  <!-- table shadow -->
  <ellipse cx="400" cy="405" rx="190" ry="34" fill="#0f172a" opacity=".06"/>

  <!-- candle body -->
  <rect x="310" y="210" width="180" height="210" rx="26" fill="#ffffff" opacity=".92" stroke="#1e3a8a" stroke-opacity=".18"/>
  <path d="M310 280c30 22 60 22 90 0s60-22 90 0v18c-30-22-60-22-90 0s-60 22-90 0z" fill="#93c5fd" opacity=".22"/>

  <!-- wick -->
  <path d="M400 190c-10 18-12 30-10 44" fill="none" stroke="#0f172a" stroke-opacity=".35" stroke-width="6" stroke-linecap="round"/>

  <!-- flame (cool soft) -->
  <path d="M400 92c36 44 50 78 50 108 0 41-30 74-50 74s-50-33-50-74c0-30 14-64 50-108z" fill="#60a5fa" opacity=".52"/>
  <path d="M400 118c22 30 30 52 30 74 0 27-17 48-30 48s-30-21-30-48c0-22 8-44 30-74z" fill="#1d4ed8" opacity=".22"/>

  <!-- subtle frame line -->
  <rect x="18" y="18" width="764" height="484" rx="22" fill="none" stroke="#1e3a8a" stroke-opacity=".10"/>
</svg>
